name: Test CI

on:
  push:
    branches:
      - main
      - master
      - antigravity
  pull_request:
    branches:
      - main
      - master
      - antigravity

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/test-db
          JWT_SECRET: supersecretjwtkeywhichisatleast32charslongfortesting
          RAZORPAY_KEY_ID: rzp_test_fakeid
          RAZORPAY_KEY_SECRET: fakekeysecret
          REDIS_URL: https://fake-redis.upstash.io
          REDIS_TOKEN: faketoken
        run: npm run test
